services:
  backend:
    build: ./backend
    container_name: deps-backend
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/data/app.db
      - SERVICE_MODE=UPSTREAM_CACHE
      - HTTP_CLIENT_TIMEOUT_SEC=10
      - CORS_ADDRESS=http://localhost:3000
    volumes:
      - backend_data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: deps-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data: